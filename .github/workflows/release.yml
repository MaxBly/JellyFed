name: Release

on:
  push:
    tags:
      - 'v*.*.*.*'   # ex: v0.1.0.0

jobs:
  build-and-deploy:
    name: Build · Package · Deploy
    runs-on: ubuntu-latest
    environment: deploy

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Version ────────────────────────────────────────────────────────────
      - name: Read version from build.yaml
        id: meta
        run: |
          VERSION=$(grep '^version:' build.yaml | awk '{print $2}' | tr -d '"')
          TARGET_ABI=$(grep '^targetAbi:' build.yaml | awk '{print $2}' | tr -d '"')
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" != "$TAG" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME ne correspond pas à build.yaml version=$VERSION"
            exit 1
          fi
          echo "version=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "target_abi=$TARGET_ABI" >> "$GITHUB_OUTPUT"
          echo "zip_name=jellyfed_${VERSION}.zip" >> "$GITHUB_OUTPUT"

      # ── .NET ───────────────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build (Release)
        run: dotnet build Jellyfin.Plugin.JellyFed -c Release -o _build --nologo -v quiet

      # ── Packaging ──────────────────────────────────────────────────────────
      - name: Package ZIP
        run: |
          mkdir -p repo
          cd _build
          zip -q "../repo/${{ steps.meta.outputs.zip_name }}" Jellyfin.Plugin.JellyFed.dll

      - name: Compute MD5 checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum "repo/${{ steps.meta.outputs.zip_name }}" | awk '{print $1}')
          echo "md5=$CHECKSUM" >> "$GITHUB_OUTPUT"

      # ── Manifest ───────────────────────────────────────────────────────────
      - name: Update manifest.json
        env:
          VERSION:    ${{ steps.meta.outputs.version }}
          TARGET_ABI: ${{ steps.meta.outputs.target_abi }}
          ZIP_NAME:   ${{ steps.meta.outputs.zip_name }}
          CHECKSUM:   ${{ steps.checksum.outputs.md5 }}
          REPO_URL:   ${{ secrets.REPO_URL }}
        run: |
          python3 - <<'PYEOF'
          import json, os
          from datetime import datetime, timezone

          manifest_path = "repo/manifest.json"
          version    = os.environ["VERSION"]
          target_abi = os.environ["TARGET_ABI"]
          zip_name   = os.environ["ZIP_NAME"]
          checksum   = os.environ["CHECKSUM"]
          repo_url   = os.environ["REPO_URL"].rstrip("/")
          timestamp  = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S.0000000Z")
          source_url = f"{repo_url}/{zip_name}"

          with open(manifest_path) as f:
              manifest = json.load(f)

          plugin = manifest[0]
          plugin["timestamp"] = timestamp

          new_ver = {
              "version":   version,
              "changelog": f"Release {version}.",
              "targetAbi": target_abi,
              "sourceUrl": source_url,
              "checksum":  checksum,
              "timestamp": timestamp,
          }

          versions = plugin.get("versions", [])
          replaced = False
          for i, v in enumerate(versions):
              if v["version"] == version:
                  versions[i] = new_ver
                  replaced = True
                  break
          if not replaced:
              versions.insert(0, new_ver)

          plugin["versions"] = versions

          with open(manifest_path, "w") as f:
              json.dump(manifest, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"manifest.json : v{version} {'(remplacée)' if replaced else '(ajoutée)'}")
          PYEOF

      # ── GitHub Release ─────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "JellyFed ${{ steps.meta.outputs.version }}"
          body: |
            ## Installation via le dépôt (recommandé)

            Ajoutez ce dépôt dans Jellyfin → Dashboard → Plugins → Repositories :
            ```
            https://jellyfed.bly-net.com/repo/manifest.json
            ```
            Puis installez JellyFed depuis le catalogue.

            **Installation manuelle :** téléchargez `${{ steps.meta.outputs.zip_name }}`, extrayez le DLL et copiez-le dans `{config}/plugins/JellyFed_${{ steps.meta.outputs.version }}/`.
          files: |
            repo/${{ steps.meta.outputs.zip_name }}
            repo/manifest.json

      # ── Deploy VPS ─────────────────────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}"     > ~/.ssh/vps_deploy
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/vps_deploy

      - name: Deploy to VPS
        env:
          ZIP_NAME: ${{ steps.meta.outputs.zip_name }}
        run: |
          # -O : forcer l'ancien protocole scp (compatible avec command= dans authorized_keys)
          SCP="scp -O -i ~/.ssh/vps_deploy -o StrictHostKeyChecking=yes"
          $SCP "repo/manifest.json" "${{ secrets.VPS_DEPLOY_TARGET }}manifest.json"
          $SCP "repo/$ZIP_NAME"     "${{ secrets.VPS_DEPLOY_TARGET }}$ZIP_NAME"
          echo "Déployé."
