# Serveur statique pour le dépôt JellyFed en développement local (LAN).
# Les fichiers proviennent du volume monté sur /usr/share/nginx/html (dossier repo/).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    charset utf-8;

    # Permet de vérifier rapidement le contenu du dossier depuis un navigateur.
    autoindex on;

    # ZIP du plugin : téléchargements potentiellement volumineux.
    sendfile on;
    tcp_nopush on;

    location / {
        try_files $uri =404;
    }
}
